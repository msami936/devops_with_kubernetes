# Parent service (log-output calls this; HTTPRoute attaches here)
apiVersion: v1
kind: Service
metadata:
  name: greeter-svc
  namespace: exercises
  labels:
    app: greeter
spec:
  selector:
    app: greeter
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
# Versioned backends for weighted routing
apiVersion: v1
kind: Service
metadata:
  name: greeter-svc-1
  namespace: exercises
  labels:
    app: greeter
    version: v1
spec:
  selector:
    app: greeter
    version: v1
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: greeter-svc-2
  namespace: exercises
  labels:
    app: greeter
    version: v2
spec:
  selector:
    app: greeter
    version: v2
  ports:
    - name: http
      port: 3000
      targetPort: 3000
