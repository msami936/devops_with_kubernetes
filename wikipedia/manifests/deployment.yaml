apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipedia
  namespace: exercises
  labels:
    app: wikipedia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikipedia
  template:
    metadata:
      labels:
        app: wikipedia
    spec:
      # Shared emptyDir: init writes initial HTML, sidecar refreshes it, nginx serves it.
      # https://kubernetes.io/docs/concepts/storage/volumes/#emptydir
      volumes:
        - name: www
          emptyDir: {}

      initContainers:
        - name: fetch-kubernetes
          image: curlimages/curl:8.5.0
          volumeMounts:
            - name: www
              mountPath: /usr/share/nginx/html
          command:
            - sh
            - -c
            - |
              set -e
              echo "Fetching Kubernetes Wikipedia page..."
              curl -fsSL -L \
                -A "WikipediaPod/5.4 (DevOps with Kubernetes exercise)" \
                --max-time 60 \
                -o /usr/share/nginx/html/index.html \
                "https://en.wikipedia.org/wiki/Kubernetes"
              ls -la /usr/share/nginx/html
              echo "Init fetch done."

      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: www
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: random-refresher
          image: curlimages/curl:8.5.0
          volumeMounts:
            - name: www
              mountPath: /usr/share/nginx/html
          env:
            # 5–15 minutes (seconds)
            - name: MIN_SLEEP_SEC
              value: "300"
            - name: MAX_SLEEP_SEC
              value: "900"
          command:
            - sh
            - -c
            - |
              echo "Sidecar started; will refresh with Special:Random every ${MIN_SLEEP_SEC}-${MAX_SLEEP_SEC}s"
              while true; do
                RANGE=$((MAX_SLEEP_SEC - MIN_SLEEP_SEC + 1))
                RAND=$(od -An -N2 -tu2 /dev/urandom | tr -d ' ')
                SLEEP=$((MIN_SLEEP_SEC + RAND % RANGE))
                echo "Sleeping ${SLEEP}s before next random page..."
                sleep "$SLEEP"
                echo "Fetching random Wikipedia page..."
                if curl -fsSL -L \
                  -A "WikipediaPod/5.4 (DevOps with Kubernetes exercise)" \
                  --max-time 60 \
                  -o /usr/share/nginx/html/index.html.tmp \
                  "https://en.wikipedia.org/wiki/Special:Random"; then
                  mv /usr/share/nginx/html/index.html.tmp /usr/share/nginx/html/index.html
                  echo "Updated index.html at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                else
                  echo "Fetch failed; keeping previous page"
                  rm -f /usr/share/nginx/html/index.html.tmp
                fi
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
