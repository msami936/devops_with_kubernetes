apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: todo-project
  namespace: flux-system
spec:
  interval: 1m
  path: ./the_project/kustomize/overlays/local
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Wait for namespace/apps before marking ready
  timeout: 5m
