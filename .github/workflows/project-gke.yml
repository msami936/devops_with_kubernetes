name: Deploy todo project to GKE

on:
  push:
    branches: [main]
    paths:
      - "the_project/**"
      - ".github/workflows/project-gke.yml"
  workflow_dispatch:

env:
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-a
  PROJECT_ID: sigma-tractor-452214-c9
  DOCKERHUB_USER: msami936

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and push images
        working-directory: the_project
        run: |
          TAG="${{ github.sha }}"
          docker build -t "${DOCKERHUB_USER}/todo-app:${TAG}" .
          docker build -t "${DOCKERHUB_USER}/todo-backend:${TAG}" ./backend
          docker push "${DOCKERHUB_USER}/todo-app:${TAG}"
          docker push "${DOCKERHUB_USER}/todo-backend:${TAG}"
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy with Kustomize
        working-directory: the_project/kustomize/overlays/gke
        run: |
          kustomize edit set image \
            "todo-app=${DOCKERHUB_USER}/todo-app:${IMAGE_TAG}" \
            "todo-backend=${DOCKERHUB_USER}/todo-backend:${IMAGE_TAG}"

          kubectl apply -k .
          kubectl rollout status deployment/todo-app -n project --timeout=300s
          kubectl rollout status deployment/todo-backend -n project --timeout=300s
          kubectl get pods,svc,ingress -n project
