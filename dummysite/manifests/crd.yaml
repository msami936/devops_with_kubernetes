apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dummysites.stable.dwk
spec:
  group: stable.dwk
  names:
    kind: DummySite
    listKind: DummySiteList
    plural: dummysites
    singular: dummysite
    shortNames:
      - ds
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - website_url
              properties:
                website_url:
                  type: string
                  description: URL of the website to copy and serve
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                url:
                  type: string
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .spec.website_url
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
