apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ping-pong
  namespace: exercises
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
        - name: ping-pong
          image: ping-pong:4.4
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: ENABLE_CPU_STRESS
              value: "false"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 1
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 30s }
        - analysis:
            templates:
              - templateName: pingpong-cpu-analysis
            args:
              - name: namespace
                value: exercises
        - setWeight: 100
