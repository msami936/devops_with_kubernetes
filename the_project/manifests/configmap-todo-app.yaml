apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-app-config
  namespace: project
data:
  PORT: "3000"
  DATA_DIR: /data
  CACHE_MS: "600000"
  PICSUM_URL: https://picsum.photos/1200
  TODOS_API_PATH: /todos
  IMAGE_ROUTE: /image
  IMAGE_FILENAME: image.jpg
  META_FILENAME: image-meta.json
  MAX_TODO_LENGTH: "500"
