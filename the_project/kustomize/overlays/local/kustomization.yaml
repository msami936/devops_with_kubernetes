apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: project

resources:
  - ../../base
  - ingress.yaml

patches:
  - target:
      kind: CronJob
      name: todo-db-backup
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: todo-db-backup
  - target:
      kind: PersistentVolumeClaim
      name: todo-image-pvc
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: todo-image-pvc
  - path: todo-app-emptydir.yaml

images:
  - name: todo-app
    newName: msami936/todo-app
    newTag: "4.5"
  - name: todo-backend
    newName: msami936/todo-backend
    newTag: "4.6"
  - name: todo-broadcaster
    newName: msami936/todo-broadcaster
    newTag: "4.6"
