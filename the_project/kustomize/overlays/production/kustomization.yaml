apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - namespace.yaml
  - ../../base
  - ingress.yaml

# Production: forward to external webhook (Secret applied outside GitOps); keep DB backup CronJob
patches:
  - path: broadcaster-forward.yaml
  - target:
      kind: PersistentVolumeClaim
      name: todo-image-pvc
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: todo-image-pvc
  - target:
      kind: Deployment
      name: todo-app
    patch: |-
      - op: replace
        path: /spec/strategy
        value:
          type: RollingUpdate
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: todo-image-data
            emptyDir: {}

images:
  - name: todo-app
    newName: msami936/todo-app
    newTag: "4.5"
  - name: todo-backend
    newName: msami936/todo-backend
    newTag: "4.6"
  - name: todo-broadcaster
    newName: msami936/todo-broadcaster
    newTag: "4.9"
