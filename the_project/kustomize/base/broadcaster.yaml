apiVersion: apps/v1
kind: Deployment
metadata:
  name: broadcaster
spec:
  replicas: 6
  selector:
    matchLabels:
      app: broadcaster
  template:
    metadata:
      labels:
        app: broadcaster
    spec:
      containers:
        - name: broadcaster
          image: todo-broadcaster
          envFrom:
            - configMapRef:
                name: broadcaster-config
          env:
            # staging: false (log only); production overlay sets true + webhook Secret
            - name: FORWARD_TO_EXTERNAL
              value: "false"
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
