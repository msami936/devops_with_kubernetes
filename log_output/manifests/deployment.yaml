apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      containers:
        - name: log-generator
          image: log-output:2.1
          imagePullPolicy: Never
          command: ["node", "generator.js"]
          env:
            - name: LOG_FILE
              value: /shared/log.txt
          volumeMounts:
            - name: shared-log
              mountPath: /shared
        - name: log-reader
          image: log-output:2.1
          imagePullPolicy: Never
          command: ["node", "reader.js"]
          env:
            - name: PORT
              value: "3000"
            - name: LOG_FILE
              value: /shared/log.txt
            - name: PINGPONG_URL
              value: http://ping-pong:3000/pings
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-log
              mountPath: /shared
      volumes:
        - name: shared-log
          emptyDir: {}
